version: '3.8'

services:
  # ═════════════════════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═════════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:14-alpine
    container_name: metalcrm-db
    environment:
      POSTGRES_DB: metalcrm
      POSTGRES_USER: metalcrm_user
      POSTGRES_PASSWORD: metalcrm_secure_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - metalcrm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metalcrm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═════════════════════════════════════════════════════════════════════════════
  # Node.js Backend API
  # ═════════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metalcrm-api
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: metalcrm
      DB_USER: metalcrm_user
      DB_PASSWORD: metalcrm_secure_password_change_me
      JWT_SECRET: your_super_secret_jwt_key_here_change_in_production
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metalcrm-network
    restart: unless-stopped

  # ═════════════════════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy (опционально)
  # ═════════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: metalcrm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - metalcrm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  metalcrm-network:
    driver: bridge
